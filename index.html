<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Clock</title>
  <style>
    /* ── Reset ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Body — dark blue-teal gradient background ── */
    body {
      min-height: 100vh;
      background: linear-gradient(
        135deg,
        #1a2a4a 0%,
        #1e3a5f 30%,
        #162d4a 60%,
        #1a3550 100%
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ── Clock card ── */
    .clock-card {
      background: rgba(28, 40, 62, 0.88);
      border-radius: 20px;
      padding: 50px 70px;
      text-align: center;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.07);
      min-width: 360px;
    }

    /* ── Title ── */
    .clock-card h1 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 22px;
      letter-spacing: 1px;
    }

    /* ── Digital time display ── */
    #time {
      font-size: 60px;
      font-weight: 700;
      color: #00e5c0;           /* cyan / teal colour */
      letter-spacing: 5px;
      font-family: 'Courier New', Courier, monospace;
      text-shadow: 0 0 18px rgba(0, 229, 192, 0.55);
    }

    /* ── Date display ── */
    #date {
      margin-top: 18px;
      font-size: 14px;
      color: rgba(180, 210, 240, 0.55);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Team names ── */
    .team {
      margin-top: 30px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="clock-card">
    <h1>Digital Clock</h1>
    <div id="time">00:00:00</div>
    <div id="date"></div>
    <div class="team">
     
    </div>
  </div>

  <script>
    /* ── JavaScript: updates time and date every second ── */

    function updateClock() {
      const now = new Date();

      /* --- Time --- */
      const hours   = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('time').textContent =
        hours + ':' + minutes + ':' + seconds;

      /* --- Date --- */
      const dayNames   = ['Sunday','Monday','Tuesday','Wednesday',
                          'Thursday','Friday','Saturday'];
      const monthNames = ['January','February','March','April','May',
                          'June','July','August','September',
                          'October','November','December'];
      const dayName   = dayNames[now.getDay()];
      const monthName = monthNames[now.getMonth()];
      const date      = now.getDate();
      const year      = now.getFullYear();
      document.getElementById('date').textContent =
        dayName + ', ' + monthName + ' ' + date + ', ' + year;
    }

    /* Run immediately, then every 1000ms */
    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
